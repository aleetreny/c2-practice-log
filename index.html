<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C2 Practice Log</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Single-owner Cambridge C2 practice tracker for saving attempts, monitoring scale-score progress, and reviewing performance by exam section.">
  <meta name="author" content="C2 Practice Log">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect x=%2220%22 y=%2220%22 width=%2260%22 height=%2260%22 fill=%22%234b5563%22/></svg>">
  
  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Styling -->
  <link rel="stylesheet" href="styles.css?v=review-layout-1">
</head>
<body>

  <!-- SPA Target Container -->
  <div id="app-container">
    <div style="display:flex; justify-content:center; align-items:center; height:100vh; background-color:#f9fafb;">
      <div style="text-align:center; font-family:'Inter', sans-serif; color:#1f2937;">
        <h2 style="margin-bottom:1rem; font-weight: 700;">Initializing C2 Practice Log...</h2>
        <div class="loader" style="border: 4px solid rgba(0,0,0,0.05); border-radius: 50%; border-top: 4px solid #4b5563; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
      </div>
    </div>
  </div>

  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <!-- Scripts -->
  <script src="questions.js?v=review-layout-1"></script>
  <script src="app.js?v=review-layout-1"></script>

</body>
</html>
