name: Update public profile backup

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write

concurrency:
  group: public-profile-backup
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Export only the configured owner profile
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          PUBLIC_PROFILE_OWNER_EMAIL: ${{ secrets.PUBLIC_PROFILE_OWNER_EMAIL }}
        run: node scripts/export-public-profile.js

      - name: Validate the generated backup
        run: node scripts/restore-public-profile.js --validate

      - name: Commit updated public study data
        shell: bash
        run: |
          if git diff --quiet -- public-profile-backup; then
            echo "Public profile backup is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public-profile-backup
          git commit -m "Update public profile backup"
          git push
